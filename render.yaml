services:
  - type: web
    runtime: docker
    name: chatgpt
    region: oregon
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SHOPIFY_APP_URL
        value: https://chatgpt-gma6.onrender.com
      - key: SHOPIFY_API_KEY
        value: 882512b625e3c494cc90a91230a374a2
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_orders,read_customers,read_fulfillments,write_fulfillments,read_assigned_fulfillment_orders,write_assigned_fulfillment_orders,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders
      - key: DATABASE_URL
        fromDatabase:
          name: shopify-3
          property: connectionString

databases:
  - name: shopify-3
    region: oregon
    plan: free
