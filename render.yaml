services:
  - type: web
    name: digxipop-fulfillment-app
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run setup && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: read_assigned_fulfillment_orders,read_customers,read_fulfillments,read_merchant_managed_fulfillment_orders,read_orders,write_assigned_fulfillment_orders,write_fulfillments,write_merchant_managed_fulfillment_orders
      - key: DATABASE_URL
        fromDatabase:
          name: digxipop-fulfillment-db
          property: connectionString

databases:
  - name: digxipop-fulfillment-db
    plan: starter
